name: Build Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: '镜像版本号（默认当天日期 YYYYMMDD）'
        required: false
        default: ''

env:
  IMAGE_NAME: karthrand/ubuntu-ai
  ALIYUN_REGISTRY: registry.cn-hangzhou.aliyuncs.com

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 设置版本号
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=$(date +%Y%m%d)" >> $GITHUB_OUTPUT
          fi

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 构建测试镜像 (amd64)
        run: docker build -t ubuntu-ai:test .

      - name: 测试镜像
        run: |
          echo "===== 验证 Node.js ====="
          docker run --rm ubuntu-ai:test node --version
          docker run --rm ubuntu-ai:test npm --version

          echo "===== 验证 AI CLI 工具 ====="
          docker run --rm ubuntu-ai:test claude --version
          docker run --rm ubuntu-ai:test codex --version
          docker run --rm ubuntu-ai:test opencode --version

          echo "===== 验证 MCP 配置 ====="
          docker run --rm ubuntu-ai:test cat /root/.claude.json

          echo "===== 验证 SSH 配置 ====="
          docker run --rm ubuntu-ai:test grep '^Port' /etc/ssh/sshd_config

          echo "===== 验证继承（Python/uv/git/jq） ====="
          docker run --rm ubuntu-ai:test python3 --version
          docker run --rm ubuntu-ai:test uv --version
          docker run --rm ubuntu-ai:test git --version
          docker run --rm ubuntu-ai:test jq --version

      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 登录阿里云容器镜像服务
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_REGISTRY_USER }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: 推送到 Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 推送到阿里云
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.ALIYUN_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}
            ${{ env.ALIYUN_REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  mirror-to-gitlab:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 推送到 GitLab
        run: |
          git remote add gitlab https://${{ secrets.GITLAB_USER }}:${{ secrets.GITLAB_TOKEN }}@gitlab.karthrand.cn:6443/private/ubuntu-ai.git
          git push gitlab --mirror --force
